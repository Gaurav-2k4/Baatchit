name: baatchit
description: A new Flutter chat application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.18.1
  provider: ^6.0.7
  cached_network_image: ^3.2.3
  fluttertoast: ^8.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1  

flutter:
  uses-material-design: true

# ✅ MUST be outside flutter:
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"   # ⚠️ fix path if needed
  